<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="rgba(0,255,255,0.2)" stroke-width="1">
  <!-- Simple grid pattern to mimic circuit mesh -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" />
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#grid)" />
</svg>
